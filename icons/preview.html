<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Walking Fish — Scan Icon Set</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f4f5f7;
    color: #111;
    padding: 40px 24px;
  }
  .container { max-width: 960px; margin: 0 auto; }
  h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 2px; }
  .subtitle { color: #666; font-size: 14px; margin-bottom: 32px; }
  .spec-card {
    background: #fff;
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 32px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
    display: flex;
    flex-wrap: wrap;
    gap: 24px 40px;
    font-size: 13px;
  }
  .spec-item { display: flex; flex-direction: column; gap: 2px; }
  .spec-label { color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; font-weight: 600; }
  .spec-value { font-weight: 600; color: #222; }
  section { margin-bottom: 40px; }
  h2 {
    font-size: 16px;
    font-weight: 600;
    color: #444;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid #e5e7eb;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
    gap: 12px;
  }
  .grid-2x { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
  .icon-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 16px 8px 12px;
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 1px 2px rgba(0,0,0,.05);
    transition: box-shadow .15s, transform .15s;
    cursor: default;
  }
  .icon-cell:hover {
    box-shadow: 0 4px 12px rgba(0,0,0,.1);
    transform: translateY(-2px);
  }
  .icon-cell svg { color: #333; display: block; }
  .icon-label {
    font-size: 10px;
    color: #777;
    text-align: center;
    font-weight: 500;
    line-height: 1.2;
    max-width: 72px;
  }
  .dark-section {
    background: #1a1a2e;
    border-radius: 12px;
    padding: 32px 24px;
  }
  .dark-section h2 { color: #999; border-bottom-color: #333; }
  .dark-section .icon-cell { background: #222244; }
  .dark-section .icon-cell svg { color: #e0e0ff; }
  .dark-section .icon-label { color: #9999bb; }
</style>
</head>
<body>
<div class="container">
  <h1>Scan Icon Set</h1>
  <p class="subtitle">Walking Fish Group — Staff Scanner UI</p>

  <div class="spec-card">
    <div class="spec-item"><span class="spec-label">Grid</span><span class="spec-value">24×24</span></div>
    <div class="spec-item"><span class="spec-label">Stroke</span><span class="spec-value">1.5px</span></div>
    <div class="spec-item"><span class="spec-label">Caps / Joins</span><span class="spec-value">Round / Round</span></div>
    <div class="spec-item"><span class="spec-label">Corner Radius</span><span class="spec-value">2px</span></div>
    <div class="spec-item"><span class="spec-label">Padding</span><span class="spec-value">2px</span></div>
    <div class="spec-item"><span class="spec-label">Icons</span><span class="spec-value">25</span></div>
    <div class="spec-item"><span class="spec-label">Preset</span><span class="spec-value">Clean</span></div>
  </div>

  <section>
    <h2>Native Size (24px)</h2>
    <div class="grid" id="native-grid"></div>
  </section>

  <section>
    <h2>2× Detail (48px)</h2>
    <div class="grid grid-2x" id="detail-grid"></div>
  </section>

  <section class="dark-section">
    <h2>Dark Background</h2>
    <div class="grid" id="dark-grid"></div>
  </section>
</div>

<script>
const icons = [
  ["Lock", `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/><circle cx="12" cy="16" r="1.5" fill="currentColor"/></svg>`],
  ["QR Scan", `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9V5a1 1 0 0 1 1-1h4"/><path d="M20 9V5a1 1 0 0 0-1-1h-4"/><path d="M4 15v4a1 1 0 0 0 1 1h4"/><path d="M20 15v4a1 1 0 0 1-1 1h-4"/><line x1="4" y1="12" x2="20" y2="12"/></svg>`],
  ["Camera", `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>`],
  ["Gate", `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 4H4a2 2 0 0 0-2 2v3a2 2 0 0 1 2 2 2 2 0 0 0-2 2v3a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-3a2 2 0 0 1-2-2 2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><path d="M9 12l2 2 4-4"/></svg>`],
  ["Debit", `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="8" y1="12" x2="16" y2="12"/><path d="M12 8v3"/><path d="M12 16v-3"/></svg>`],
  ["Top-Up", `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>`],
  ["Bill", `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 2h10l4 4v16H5V2z"/><path d="M15 2v4h4"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="14" y2="14"/><line x1="8" y1="18" x2="12" y2="18"/></svg>`],
  ["Bulk", `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M8 2v4"/><path d="M16 2v4"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="14" y2="14"/><line x1="8" y1="18" x2="12" y2="18"/></svg>`],
  ["Food", `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 2v7a3 3 0 0 0 6 0V2"/><line x1="10" y1="9" x2="10" y2="22"/><path d="M17 2v20"/><line x1="17" y1="7" x2="15" y2="7"/></svg>`],
  ["Drink", `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2l1.5 14a4.5 4.5 0 0 0 9 0L18 2"/><line x1="12" y1="16" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>`],
  ["Cash", `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2" ry="2"/><circle cx="12" cy="12" r="3"/><line x1="6" y1="10" x2="6" y2="10"/><line x1="18" y1="14" x2="18" y2="14"/></svg>`],
  ["Smartphone", `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="3" ry="3"/><line x1="12" y1="18" x2="12.01" y2="18"/><circle cx="12" cy="16" r="2"/></svg>`],
  ["Search", `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="7"/><line x1="21" y1="21" x2="15" y2="15"/><line x1="8" y1="10" x2="12" y2="10"/><line x1="10" y1="8" x2="10" y2="12"/></svg>`],
  ["Print", `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="10" width="12" height="8" rx="1.5"/><path d="M6 10V6a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v4"/><line x1="8" y1="14" x2="8" y2="14.01"/><line x1="8" y1="17" x2="16" y2="17"/></svg>`],
  ["Undo", `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10h13a5 5 0 0 1 0 10H11"/><polyline points="7 6 3 10 7 14"/></svg>`],
  ["File Text", `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/></svg>`],
  ["Check Circle", `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`],
  ["Credit Card", `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="6" width="22" height="14" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/><line x1="5" y1="14" x2="7" y2="14"/><line x1="9" y1="14" x2="11" y2="14"/></svg>`],
  ["Alert Triangle", `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`],
  ["Pencil", `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>`],
  ["Chevron Left", `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>`],
  ["Chevron Right", `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`],
  ["Drag Handle", `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="6" r="1.5" fill="currentColor"/><circle cx="15" cy="6" r="1.5" fill="currentColor"/><circle cx="9" cy="12" r="1.5" fill="currentColor"/><circle cx="15" cy="12" r="1.5" fill="currentColor"/><circle cx="9" cy="18" r="1.5" fill="currentColor"/><circle cx="15" cy="18" r="1.5" fill="currentColor"/></svg>`],
  ["Mail", `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/></svg>`],
  ["Download", `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="3" x2="12" y2="16"/><polyline points="7 11 12 16 17 11"/><line x1="5" y1="21" x2="19" y2="21"/></svg>`]
];

function renderGrid(containerId, scale) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  icons.forEach(([label, svg]) => {
    const cell = document.createElement('div');
    cell.className = 'icon-cell';
    let display = svg;
    if (scale !== 24) {
      display = svg.replace(/width="24"\s+height="24"/, `width="${scale}" height="${scale}"`);
    }
    cell.innerHTML = display + `<span class="icon-label">${label}</span>`;
    container.appendChild(cell);
  });
}
renderGrid('native-grid', 24);
renderGrid('detail-grid', 48);
renderGrid('dark-grid', 24);
</script>
</body>
</html>
